name: Diff-aware SAST (Semgrep)

on: 
    pull_request:
    push:
        branches: [main]
    schedule:
    - cron: '0 0 * * *' #run the workflow every day at 12 AM
    
jobs:
    semgrep_scan: #diff-aware SAST scan using Semgrep
        runs-on: ubuntu-latest #specifies the type of runner that the job will run on

        steps: #steps in the job
            - name: Checkout code #checkout the code from the repository
              uses: actions/checkout@v3 #uses the checkout action to clone the repository
              with:
                fetch-depth: 0 #fetch the full history to ensure we have all the commits for diff-aware scanning

            - name: Install Semgrep #install Semgrep using pip
              run: pip install semgrep
            
            - name: Diff-aware scan for PRs
              if: github.event_name == 'pull_request' #only run this step for pull requests
              run: semgrep ci --config=p/ci #run semgrep in CI mode, which will only scan the changed files in the pull request. You can specify the configuration as needed, for example:
              # run: semgrep ci --config=p/ci #run semgrep in CI mode with the p/ci configuration, which is a good starting point for CI scans. You can customize the configuration as needed, such as using a custom ruleset or adding additional configurations.

            - name: Full repo scan for pushes to main
              if: github.event_name == 'push' && github.ref == 'refs/heads/main' #only run this step for pushes to the main branch
              run: semgrep --config=p/default --config=p/owasp-top-ten --config=p/secrets . --sarif > semgrep-results.sarif  #run semgrep with the specified configuration (p/default) on the current directory (.) to perform a basic scan. You can customize the configuration as needed.
            
            - name: Upload Semgrep results for pushes to main
              if: github.event_name == 'push' && github.ref == 'refs/heads/main' #only upload results for pushes to the main branch
              uses: github/codeql-action/upload-sarif@v2 #uses the upload-sarif action to upload the results to GitHub Code Scanning
              with:
                sarif_file: semgrep-results.sarif #specifies the path to the SARIF file generated by Semgrep

            - name: scheduled scan for the full repository
              if: github.event_name == 'schedule' #only run this step for scheduled events
              run: semgrep --config=p/default --config=p/secrets --config=p/owasp-top-ten . --sarif > semgrep-nightly.sarif  #run semgrep with the specified configuration (p/default) on the current directory (.) to perform a basic scan. You can customize the configuration as needed.
            
            - name: Upload SARIF results (nightly)
              if: github.event_name == 'schedule' #only run this step for scheduled events
              uses: github/codeql-action/upload-sarif@v2 #uses the upload-sarif action to upload the results to GitHub Code Scanning
              with:
                sarif_file: semgrep-nightly.sarif #specifies the path to the SARIF file generated by Semgrep