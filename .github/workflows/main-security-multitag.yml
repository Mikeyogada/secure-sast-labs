name: main security (Depp Tier-Multitools)

on: 
  push:
    branches: [main]

jobs:
  deep-sast-multi-tier:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write #required for SARIF uploads

    steps:
      #checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      #install tools
      - name: install tools
        run: pip install semgrep bandit

      #semgrep full scna
      - name: Full semgrep scan
        run: semgrep --config=p/default .

      #generate Semgrep SARIF
      - name: Generate Semgrep SARIF
        run: semgrep --config=p/default --sarif > semgrep.sarif

      #uploading SARIF
      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: semgrep.sarif

      #bandit fill scan
      - name: Full bandit scan
        run: bandit -r app/
